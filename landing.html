<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Maintenance</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f9ff;
      color: #1f2a44;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
    }

    .icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px auto;
      background: #e6f0ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #2b6fff;
    }

    h1 {
      font-size: 2.5rem;
      margin: 10px 0;
      color: #1f4ed8;
    }

    p {
      font-size: 1.1rem;
      color: #4a5a75;
      line-height: 1.6;
    }

    .sub {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #6b7a99;
    }

    .bar {
      width: 80px;
      height: 4px;
      background: #2b6fff;
      margin: 25px auto;
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="icon">⚙️</div>

    <h1>Under Maintenance</h1>

    <div class="bar"></div>

    <p>
      We’re currently making improvements to the site.<br/>
      We’ll be back online shortly.
    </p>

    <div class="sub">
      Thanks for your patience.
    </div>

  </div>
</body>
</html>
